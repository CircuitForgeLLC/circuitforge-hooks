title = "CircuitForge secret + PII scanner"

[extend]
useDefault = true   # inherit all 150+ built-in gitleaks rules

# в”Ђв”Ђ CircuitForge-specific secret patterns в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[[rules]]
id = "cf-generic-env-token"
description = "Generic KEY=<token> in env-style assignment вЂ” catches FORGEJO_API_TOKEN=hex etc."
regex = '''(?i)(token|secret|key|password|passwd|pwd|api_key)\s*[=:]\s*['"]?[A-Za-z0-9\-_]{20,}['"]?'''
[rules.allowlist]
regexTarget = "match"
regexes = [
    'api_key:\s*ollama',
    'api_key:\s*any',
    'your-[a-z\-]+-here',
    'replace-with-',
    'xxxx',
    # Exact literal RHS вЂ” the cryptography stdlib call, not a secret value.
    # The bare "key" trigger substring-matches any "..._key = " assignment
    # (needed to catch things like secret_key=/signing_key=), which is why
    # this needs an explicit allowlist entry rather than tightening the regex.
    'key\s*=\s*load_pem_private_key$',
    # JS localStorage key constant (circuitforge_orch/coordinator/dashboard.html) вЂ” an
    # identifier naming a browser storage slot, not a secret value.
    "KEY\\s*=\\s*'cf-orch-dashboard-settings'",
]
# Path-scoped, not pattern-scoped: these two files hold synthetic CFG-...
# test license keys (see docs on the CFG-XXXX-... format). Allowlisting the
# *pattern* here would blind the scanner to a real leaked license key
# anywhere in the repo вЂ” so only these known fixture files are exempted,
# not the CFG- format itself.
paths = [
    'tests/test_config/test_license\.py$',
    'tests/test_resources/test_coordinator_auth\.py$',
]

# в”Ђв”Ђ PII patterns в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[[rules]]
id = "cf-phone-number"
description = "US phone number committed in source or config"
regex = '''\b(\+1[\s\-.]?)?\(?\d{3}\)?[\s\-.]?\d{3}[\s\-.]?\d{4}\b'''
[rules.allowlist]
regexes = [
    '555-\d{4}',
    '555\.\d{4}',
    '5550\d{4}',
    '^1234567890$',
    '0000000000',
    '1111111111',
    '2222222222',
    '9999999999',
    # Bare 10-digit numeric literals in circuitforge_core/mqtt/meshtastic/mqtt_backend.py's
    # docstring вЂ” Meshtastic protobuf example values (Unix timestamp, broadcast node ID
    # 2^32-1, and a longitude_i fixed-point int), not phone numbers. Unlike the phone
    # patterns above these have no separators, but the underlying regex has no way to
    # distinguish a bare 10-digit ID/timestamp from a bare 10-digit phone number, so
    # allowlisting the specific known-safe literals is the targeted fix (see
    # Test 3 in tests/test_hooks.sh, which the regex itself must keep catching).
    '^1716200000$',
    '^4294967295$',
    '^1220848320$',
    # 1 GiB in bytes вЂ” circuitforge-orch/tests/test_telemetry_sysmetrics.py's NFS
    # mountstats fixture data (/proc/mountstats sample), not a phone number.
    '^1073741824$',
]

[[rules]]
id = "cf-personal-email"
description = "Personal webmail address committed in source or config (not .example files)"
regex = '''[a-zA-Z0-9._%+\-]+@(gmail|yahoo|icloud|hotmail|outlook|proton)\.(com|me)'''
[rules.allowlist]
paths = [
    '.*\.example$',
    '.*test.*',
    '.*docs/.*',
    '.*\.md$',
]

# в”Ђв”Ђ Global allowlist в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

[allowlist]
description = "CircuitForge global allowlist"
paths = [
    '.*\.example$',
    'docs/reference/.*',
    'gitleaks\.toml$',
    # Test hook fixtures вЂ” this file injects synthetic secrets into temp repos to
    # verify the pre-commit hook catches them. Allowlisting by path (not pattern)
    # keeps the scanner blind only to this known fixture, not to the same patterns
    # anywhere else in the codebase.
    'tests/test_hooks\.sh$',
]
regexes = [
    'sk-abcdefghijklmnopqrstuvwxyz',
    'your-forgejo-api-token-here',
    'your-[a-z\-]+-here',
    # Python private function/variable on RHS вЂ” token = _some_func() is not a secret
    '=\s+_[a-z_]{10,}',
    # ModelEntry catalog key= field (circuitforge-orch scripts/pull_models_*.py) вЂ”
    # a model-download identifier, not an API key. Built-in generic-api-key rule
    # false-positives on key="<model-slug>" patterns.
    'key="granite-4\.1-8b"',
    # XKCD-famous example password phrase вЂ” appears in E2E test fixtures across
    # products (e.g. website/tests/e2e/auth/). Not a real credential.
    'correct-horse-battery-staple',
    # Synthetic dev-only license keys used as hardcoded fallbacks in local dev/test
    # environments (e.g. website/server/api/checkout/paypal/capture.post.ts).
    # Pattern: CFG-<4-char product code>-DEV<digit>-DEV<digit>-DEV<digit>
    'CFG-[A-Z]{4}-DEV\d-DEV\d-DEV\d',
]
regexTarget = "match"
